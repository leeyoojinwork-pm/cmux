name = "cmux"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# 실제 값은 wrangler secret 명령어로 설정
# SLACK_SIGNING_SECRET
# SLACK_BOT_TOKEN
# ANTHROPIC_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# GOOGLE_REFRESH_TOKEN
DAILY_SCHEDULE_CHANNEL = ""   # #01-오늘일정 채널 ID로 교체 필요
# NOTION_TOKEN
# NOTION_CONTENT_DB
# NOTION_MONEY_DB
# NOTION_REVIEW_DB

# D1 활성화하려면 아래 주석 해제 후 database_id 입력
# [[d1_databases]]
# binding = "DB"
# database_name = "cmux-history"
# database_id = ""

# Cron: 매일 KST 09:00 아침 브리핑, 매일 KST 18:00 회고 리마인더, 매주 금 KST 17:00 주간 회고
[triggers]
# crons = ["0 0 * * *", "0 9 * * *", "0 8 * * 5"]  # 계정 크론 한도 5개 초과 — 불필요 워커 제거 후 재활성화
